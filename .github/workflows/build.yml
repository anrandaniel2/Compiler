name: Build NexusClient

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Extract source bundle
      run: python3 extract.py

    - name: Setup Android SDK and NDK
      uses: android-actions/setup-android@v3
      with:
        packages: ndk;28.0.12674087

    - name: Install Ninja
      run: sudo apt-get install -y ninja-build

    - name: Configure CMake
      run: |
        NDK_DIR=$(ls -d $ANDROID_HOME/ndk/*/)
        cmake -S . -B build-arm64 -G Ninja \
          -DCMAKE_TOOLCHAIN_FILE=$NDK_DIR/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-28 \
          -DANDROID_STL=c++_shared \
          -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build-arm64 --config Release -j4

    - name: Package .levipack
      run: cmake --build build-arm64 --target levi_package

    - name: Upload .levipack
      uses: actions/upload-artifact@v4
      with:
        name: NexusClient-levipack
        path: build-arm64/*.levipack
        if-no-files-found: warn

    - name: Upload .so
      uses: actions/upload-artifact@v4
      with:
        name: libclient-arm64
        path: build-arm64/libnexus_client.so
        if-no-files-found: warn
