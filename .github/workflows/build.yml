name: Build NexusClient

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Extract source bundle
      run: python3 extract.py

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r26b
        add-to-path: true

    - name: Install Ninja
      run: sudo apt-get install -y ninja-build

    - name: Clone ImGui
      run: |
        rm -rf src/imgui
        git clone --depth 1 https://github.com/ocornut/imgui -b docking src/imgui

    - name: Skip Dobby (use built-in stub)
      run: echo "Using DobbyStub - Dobby master is broken with modern NDK"

    - name: Configure CMake
      env:
        ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
      run: >
        cmake -B build -G Ninja
        -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake
        -DANDROID_ABI=arm64-v8a
        -DANDROID_PLATFORM=android-26
        -DCMAKE_BUILD_TYPE=Release
        -DUSE_DOBBY_STUB=ON

    - name: Build
      run: cmake --build build -j4

    - name: Prepare artifact
      run: |
        mkdir -p artifact
        find build -name "*.so" -exec cp {} artifact/ \;
        echo "Build outputs:"
        ls -la artifact/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: libclient-arm64
        path: artifact/
        if-no-files-found: error
        retention-days: 30
